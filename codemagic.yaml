workflows:
  ios-release:
    name: WaveTalk iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: appstore_codemagic_admin
    environment:
      xcode: 26.4
      node: 22
      groups:
        - wavetalk
      vars:
        XCODE_WORKSPACE: ios/WaveTalk.xcworkspace
        XCODE_SCHEME: WaveTalk
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Patch xcconfigs — Xcode 26 C++ compatibility
        script: |
          echo "Patching xcconfig files: c++20 → c++17"
          find ios/Pods -name "*.xcconfig" \
            -exec sed -i '' 's/CLANG_CXX_LANGUAGE_STANDARD = c++20/CLANG_CXX_LANGUAGE_STANDARD = c++17/g' {} \;
          echo "Done. Patched files:"
          find ios/Pods -name "*.xcconfig" | xargs grep -l "CLANG_CXX_LANGUAGE_STANDARD" | head -20
      - name: Set build number
        script: |
          cd ios
          agvtool new-version -all $BUILD_NUMBER
      - name: Remove push notification entitlement
        script: |
          /usr/libexec/PlistBuddy -c "Delete :aps-environment" ios/WaveTalk/WaveTalk.entitlements 2>/dev/null || true
      - name: Set up code signing
        script: |
          keychain initialize
          export APP_STORE_CONNECT_KEY_IDENTIFIER="$APP_STORE_CONNECT_KEY_ID"
          export APP_STORE_CONNECT_PRIVATE_KEY="$APP_STORE_CONNECT_API_KEY"
          app-store-connect fetch-signing-files com.wavetalk.app \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
      - name: Configure Xcode signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
