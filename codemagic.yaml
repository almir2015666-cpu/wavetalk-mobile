workflows:
  ios-release:
    name: WaveTalk iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: appstore_codemagic_admin
    environment:
      node: 22
      groups:
        - wavetalk
      vars:
        BUNDLE_ID: "com.wavetalk.app"
        XCODE_WORKSPACE: "ios/WaveTalk.xcworkspace"
        XCODE_SCHEME: "WaveTalk"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Fix Expo versions
        script: npx expo install --fix

      - name: Patch expo-av source for Expo 56 XCFramework compatibility
        script: |
          python3 -c "
          import os

          # expo-av@16.x imports <ExpoModulesCore/EXEventEmitter.h> which Expo 56
          # no longer exposes in the prebuilt XCFramework. The compiler resolves
          # <Framework/H.h> via -F framework paths. The XCFrameworkIntermediates
          # are created during the build (after ScanDependencies runs), so any
          # build-phase-level header patches arrive too late. The only reliable fix
          # is to patch the source file before it is compiled.
          exav_h = 'node_modules/expo-av/ios/EXAV/EXAV.h'
          if not os.path.exists(exav_h):
              print('EXAV.h not found — skip')
          else:
              with open(exav_h) as f:
                  content = f.read()
              stub = '''/* EXEventEmitter stub: Expo 56 XCFramework does not expose this header */
          @protocol EXEventEmitter <NSObject>
          - (NSArray<NSString *> *)supportedEvents;
          - (void)startObserving;
          - (void)stopObserving;
          @end'''
              orig = '#import <ExpoModulesCore/EXEventEmitter.h>'
              if orig in content:
                  with open(exav_h, 'w') as f:
                      f.write(content.replace(orig, stub))
                  print('Patched EXAV.h: inline EXEventEmitter protocol stub')
              else:
                  print('EXEventEmitter import not present in EXAV.h (already patched or version changed)')
          "

      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Patch Pods.xcodeproj
        script: |
          ruby << 'RUBY_EOF'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('ios/Pods/Pods.xcodeproj')

          project.targets.each do |target|
            # EXAV: exclude video Swift files — WaveTalk is audio-only, and the
            # Swift video files trigger ExpoModulesCore Clang module build issues
            if target.name == 'EXAV'
              target.build_configurations.each do |config|
                config.build_settings['EXCLUDED_SOURCE_FILE_NAMES'] = 'ExpoVideoView.swift VideoViewModule.swift'
              end
              puts 'EXAV: excluded video Swift files'
            end

            # ExpoTaskManager: expo-task-manager 14.x uses legacy RCT bridge APIs.
            # RN 0.85.3 defines RCT_REMOVE_LEGACY_ARCH=1 which removes those APIs.
            # Override to 0 so the legacy ObjC code compiles.
            if target.name == 'ExpoTaskManager'
              target.build_configurations.each do |config|
                existing = Array(config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] || '$(inherited)')
                existing.reject! { |d| d.to_s.include?('RCT_REMOVE_LEGACY_ARCH') }
                existing << 'RCT_REMOVE_LEGACY_ARCH=0'
                config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] = existing
              end
              puts 'ExpoTaskManager: set RCT_REMOVE_LEGACY_ARCH=0'
            end
          end

          project.save
          puts 'xcodeproj patches applied'
          RUBY_EOF

      - name: Remove push notification entitlement
        script: /usr/libexec/PlistBuddy -c "Delete :aps-environment" ios/WaveTalk/WaveTalk.entitlements 2>/dev/null || true

      - name: Create ExportOptions.plist
        script: |
          python3 -c "
          import plistlib, os
          data = {
              'method': 'app-store-connect',
              'teamID': os.environ.get('APPLE_TEAM_ID', '66U94U6Q5H'),
              'signingStyle': 'manual',
              'provisioningProfiles': {'com.wavetalk.app': 'wavetalk-appstore'},
              'uploadBitcode': False,
              'uploadSymbols': True,
              'compileBitcode': False
          }
          with open('ios/ExportOptions.plist', 'wb') as f:
              plistlib.dump(data, f, fmt=plistlib.FMT_XML)
          "

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build number
        script: cd ios && agvtool new-version -all $(date +%s)

      - name: Archive
        script: |
          set -o pipefail
          mkdir -p /tmp/xcodebuild_logs
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/WaveTalk.xcarchive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER=wavetalk-appstore \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            archive 2>&1 | tee /tmp/xcodebuild_logs/build.log

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/WaveTalk.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/

    artifacts:
      - build/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
