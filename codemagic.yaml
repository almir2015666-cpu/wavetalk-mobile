workflows:
  ios-release:
    name: WaveTalk iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: appstore_codemagic_admin
    environment:
      node: 22
      groups:
        - wavetalk
      vars:
        BUNDLE_ID: "com.wavetalk.app"
        XCODE_WORKSPACE: "ios/WaveTalk.xcworkspace"
        XCODE_SCHEME: "WaveTalk"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Fix Expo versions
        script: npx expo install --fix

      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Patch Pods.xcodeproj for Xcode 26 / Expo 56 compatibility
        script: |
          ruby << 'RUBY_EOF'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('ios/Pods/Pods.xcodeproj')

          project.targets.each do |target|
            # ----------------------------------------------------------------
            # EXAV: exclude video Swift files.
            # WaveTalk is audio-only. The video Swift files (ExpoVideoView.swift,
            # VideoViewModule.swift) trigger an ExpoModulesCore Clang module
            # build that fails with Expo 56's prebuilt XCFramework.
            # ----------------------------------------------------------------
            if target.name == 'EXAV'
              target.build_configurations.each do |config|
                config.build_settings['EXCLUDED_SOURCE_FILE_NAMES'] = 'ExpoVideoView.swift VideoViewModule.swift'
              end
              puts 'EXAV: excluded video Swift files'
            end

            # ----------------------------------------------------------------
            # ExpoModulesCore: inject a build phase that creates EXEventEmitter.h
            # in the XCFrameworkIntermediates directory RIGHT AFTER the Expo
            # "Switch XCFramework" script copies the framework there.
            #
            # Why: expo-av@16.0.8 imports <ExpoModulesCore/EXEventEmitter.h>.
            # Expo 56 ships ExpoModulesCore as a prebuilt XCFramework that no
            # longer exposes this header. The compiler resolves <Framework/H.h>
            # via the -F (framework) search path which points to the
            # XCFrameworkIntermediates copy, not the source pods directory.
            # Patching the source directory has no effect; we must patch the
            # intermediates directory at build time via a shell build phase.
            # ----------------------------------------------------------------
            if target.name == 'ExpoModulesCore'
              patch_script = <<~'SHELL'
                HEADERS="$BUILT_PRODUCTS_DIR/XCFrameworkIntermediates/ExpoModulesCore/ExpoModulesCore.framework/Headers"
                if [ ! -d "$HEADERS" ]; then
                  echo "[WaveTalk] ExpoModulesCore headers dir not found at $HEADERS — skip"
                  exit 0
                fi
                if [ ! -f "$HEADERS/EXEventEmitter.h" ]; then
                  printf '#pragma once\n#import <Foundation/Foundation.h>\n@protocol EXEventEmitter <NSObject>\n- (NSArray<NSString *> *)supportedEvents;\n- (void)startObserving;\n- (void)stopObserving;\n@end\n' > "$HEADERS/EXEventEmitter.h"
                  echo "[WaveTalk] Created EXEventEmitter.h in XCFrameworkIntermediates"
                fi
              SHELL
              phase = target.new_shell_script_build_phase('[WaveTalk] Patch ExpoModulesCore Headers')
              phase.shell_script = patch_script
              puts 'ExpoModulesCore: added EXEventEmitter.h patch build phase'
            end

            # ----------------------------------------------------------------
            # ExpoTaskManager: expo-task-manager 14.x uses legacy RCT bridge
            # APIs. RN 0.85.3 sets RCT_REMOVE_LEGACY_ARCH=1 in the preprocessor
            # definitions, which removes those APIs and causes ObjC compile
            # errors. Override it to 0 so the legacy code still compiles.
            # ----------------------------------------------------------------
            if target.name == 'ExpoTaskManager'
              target.build_configurations.each do |config|
                existing = Array(config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] || '$(inherited)')
                existing.reject! { |d| d.to_s.include?('RCT_REMOVE_LEGACY_ARCH') }
                existing << 'RCT_REMOVE_LEGACY_ARCH=0'
                config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] = existing
              end
              puts 'ExpoTaskManager: set RCT_REMOVE_LEGACY_ARCH=0'
            end
          end

          project.save
          puts 'xcodeproj patches applied'
          RUBY_EOF

      - name: Remove push notification entitlement
        script: /usr/libexec/PlistBuddy -c "Delete :aps-environment" ios/WaveTalk/WaveTalk.entitlements 2>/dev/null || true

      - name: Create ExportOptions.plist
        script: |
          python3 -c "
          import plistlib, os
          data = {
              'method': 'app-store-connect',
              'teamID': os.environ.get('APPLE_TEAM_ID', '66U94U6Q5H'),
              'signingStyle': 'manual',
              'provisioningProfiles': {'com.wavetalk.app': 'wavetalk-appstore'},
              'uploadBitcode': False,
              'uploadSymbols': True,
              'compileBitcode': False
          }
          with open('ios/ExportOptions.plist', 'wb') as f:
              plistlib.dump(data, f, fmt=plistlib.FMT_XML)
          "

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build number
        script: cd ios && agvtool new-version -all $(date +%s)

      - name: Archive
        script: |
          set -o pipefail
          mkdir -p /tmp/xcodebuild_logs
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/WaveTalk.xcarchive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER=wavetalk-appstore \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            archive 2>&1 | tee /tmp/xcodebuild_logs/build.log

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/WaveTalk.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/

    artifacts:
      - build/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
