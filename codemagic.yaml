workflows:
  ios-release:
    name: WaveTalk iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - wavetalk
      vars:
        BUNDLE_ID: com.wavetalk.app
        XCODE_WORKSPACE: ios/WaveTalk.xcworkspace
        XCODE_SCHEME: WaveTalk
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Remove push notification entitlement
        script: |
          /usr/libexec/PlistBuddy -c "Delete :aps-environment" ios/WaveTalk/WaveTalk.entitlements 2>/dev/null || true
      - name: Write API key
        script: |
          echo "$APP_STORE_CONNECT_API_KEY" > /tmp/AuthKey.p8
          chmod 600 /tmp/AuthKey.p8
      - name: Build iOS
        script: |
          set -o pipefail
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/WaveTalk.xcarchive \
            archive \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGNING_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/AuthKey.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_ID \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID \
            2>&1
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/WaveTalk.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/ \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/AuthKey.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_ID \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID
    artifacts:
      - build/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
