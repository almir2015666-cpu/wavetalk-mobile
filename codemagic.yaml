workflows:
  ios-release:
    name: WaveTalk iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: appstore_codemagic_admin
    environment:
      node: 22
      groups:
        - wavetalk
      vars:
        BUNDLE_ID: "com.wavetalk.app"
        XCODE_WORKSPACE: "ios/WaveTalk.xcworkspace"
        XCODE_SCHEME: "WaveTalk"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Fix Expo versions
        script: npx expo install --fix

      - name: Verify package versions
        script: |
          node -e "
            const pkgs = ['expo-av','expo-task-manager','expo-notifications','expo-haptics','expo-linear-gradient','expo-keep-awake','expo-file-system'];
            pkgs.forEach(p => {
              try { console.log(p + ': ' + require('./node_modules/' + p + '/package.json').version); }
              catch(e) { console.log(p + ': NOT FOUND'); }
            });
          "

      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Remove push notification entitlement
        script: /usr/libexec/PlistBuddy -c "Delete :aps-environment" ios/WaveTalk/WaveTalk.entitlements 2>/dev/null || true

      - name: Create ExportOptions.plist
        script: |
          python3 -c "
          import plistlib, os
          data = {
              'method': 'app-store-connect',
              'teamID': os.environ.get('APPLE_TEAM_ID', '66U94U6Q5H'),
              'signingStyle': 'manual',
              'provisioningProfiles': {'com.wavetalk.app': 'wavetalk-appstore'},
              'uploadBitcode': False,
              'uploadSymbols': True,
              'compileBitcode': False
          }
          with open('ios/ExportOptions.plist', 'wb') as f:
              plistlib.dump(data, f, fmt=plistlib.FMT_XML)
          "

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build number
        script: cd ios && agvtool new-version -all $(date +%s)

      - name: Archive
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/WaveTalk.xcarchive \
            -quiet \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER=wavetalk-appstore \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            archive

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/WaveTalk.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/

    artifacts:
      - build/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
