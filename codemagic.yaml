workflows:
  ios-release:
    name: WaveTalk iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: appstore_codemagic_admin
    environment:
      node: 22
      groups:
        - wavetalk
      vars:
        BUNDLE_ID: "com.wavetalk.app"
        XCODE_WORKSPACE: "ios/WaveTalk.xcworkspace"
        XCODE_SCHEME: "WaveTalk"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Fix Expo versions
        script: npx expo install --fix

      - name: Patch expo-av source for Expo 56 XCFramework compatibility
        script: |
          python3 - << 'PYEOF'
          import os

          # expo-av@16.x uses several <ExpoModulesCore/...> headers that Expo 56
          # no longer exposes in the prebuilt XCFramework. The compiler resolves
          # <Framework/H.h> via -F framework paths pointing to XCFrameworkIntermediates,
          # which are created during the build (after ScanDependencies runs). Any
          # build-phase-level patches arrive too late. The fix is to patch the source
          # files directly so the imports never hit the -F path at all.

          def patch_file(path, replacements):
              if not os.path.exists(path):
                  print(f'{path} not found — skip')
                  return
              with open(path) as f:
                  content = f.read()
              changed = False
              for orig, stub in replacements.items():
                  if orig in content:
                      content = content.replace(orig, stub)
                      print(f'  Patched: {orig}')
                      changed = True
                  else:
                      print(f'  Already patched or absent: {orig}')
              if changed:
                  with open(path, 'w') as f:
                      f.write(content)

          # ── EXAV.h ────────────────────────────────────────────────────────────
          print('Patching EXAV.h ...')
          patch_file('node_modules/expo-av/ios/EXAV/EXAV.h', {
              '#import <ExpoModulesCore/EXEventEmitter.h>':
                  '/* EXEventEmitter stub (Expo 56: not in XCFramework) */\n'
                  '@protocol EXEventEmitter <NSObject>\n'
                  '- (NSArray<NSString *> *)supportedEvents;\n'
                  '- (void)startObserving;\n'
                  '- (void)stopObserving;\n'
                  '@end',
          })

          # ── EXVideoView.h ─────────────────────────────────────────────────────
          # EXModuleRegistry and EXLegacyExpoViewProtocol are not in the Expo 56
          # XCFramework public Headers/ (import fails at ScanDependencies).
          # EXModuleRegistry IS still in the ExpoModulesCore PCM (exported via the
          # umbrella header); using a forward declaration avoids the redefinition
          # error while still allowing pointer types and method calls (the full
          # definition arrives from the PCM when ExpoModulesCore loads via EXAV.h).
          # EXLegacyExpoViewProtocol is NOT in the PCM (removed entirely), so it
          # needs a full inline protocol stub for the conformance declaration.
          print('Patching EXVideoView.h ...')
          patch_file('node_modules/expo-av/ios/EXAV/Video/EXVideoView.h', {
              '#import <ExpoModulesCore/EXModuleRegistry.h>':
                  '/* EXModuleRegistry: forward-declare only — full definition comes from '
                  'ExpoModulesCore PCM (loaded via EXModuleRegistryConsumer.h in EXAV.h). '
                  'Expo 56 removed this header from XCFramework public Headers/. */\n'
                  '@class EXModuleRegistry;',

              '#import <ExpoModulesCore/EXLegacyExpoViewProtocol.h>':
                  '/* EXLegacyExpoViewProtocol stub (Expo 56: removed entirely from PCM) */\n'
                  '@protocol EXLegacyExpoViewProtocol <NSObject>\n'
                  '@optional\n'
                  '@end',
          })

          # ── EXVideoView.m ─────────────────────────────────────────────────────
          # EXUtilities IS in the ExpoModulesCore PCM (confirmed: its @interface stub
          # caused a redefinition error).  Remove the @interface stub entirely and let
          # the PCM supply the full definition.  EX_WEAKIFY / EX_ENSURE_STRONGIFY are
          # defined in EXDefines.h (which IS in the XCFramework); guard with #ifndef
          # so we only define them if they haven't arrived through the PCM yet.
          print('Patching EXVideoView.m ...')
          patch_file('node_modules/expo-av/ios/EXAV/Video/EXVideoView.m', {
              '#import <ExpoModulesCore/EXUtilities.h>':
                  '/* EXUtilities: header absent from XCFramework public Headers/ but the '
                  'class IS in the PCM — no @interface stub needed; PCM provides it. */\n'
                  '#ifndef EX_WEAKIFY\n'
                  '#define EX_WEAKIFY(var) __weak typeof(var) weak_##var = var;\n'
                  '#endif\n'
                  '#ifndef EX_ENSURE_STRONGIFY\n'
                  '#define EX_ENSURE_STRONGIFY(var) __strong typeof(weak_##var) var = weak_##var; if (!var) return;\n'
                  '#endif',
          })

          # ── EXAV.m ────────────────────────────────────────────────────────────
          # Several service/delegate headers were removed from XCFramework in Expo 56.
          # EXUIManager.h, EXFileSystemInterface.h, EXPermissionsInterface.h are still
          # present (verified: not in the failure list). The others below are missing.
          # Stubs provide only the method signatures actually called in EXAV.m;
          # implementations stay in the XCFramework binary.
          print('Patching EXAV.m ...')
          patch_file('node_modules/expo-av/ios/EXAV/EXAV.m', {
              '#import <ExpoModulesCore/EXEventEmitterService.h>':
                  '/* EXEventEmitterService stub (Expo 56: not in XCFramework) */\n'
                  '@protocol EXEventEmitterService <NSObject>\n'
                  '- (void)sendEventWithName:(NSString *)name body:(id)body;\n'
                  '@end',

              '#import <ExpoModulesCore/EXAppLifecycleService.h>':
                  '/* EXAppLifecycleService stub (Expo 56: not in XCFramework) */\n'
                  '@protocol EXAppLifecycleService <NSObject>\n'
                  '- (void)registerAppLifecycleListener:(id)listener;\n'
                  '- (void)unregisterAppLifecycleListener:(id)listener;\n'
                  '@end',

              '#import <ExpoModulesCore/EXPermissionsMethodsDelegate.h>':
                  '/* EXPermissionsMethodsDelegate stub (Expo 56: not in XCFramework public headers) */\n'
                  '@interface EXPermissionsMethodsDelegate : NSObject\n'
                  '+ (void)registerRequesters:(NSArray *)requesters withPermissionsManager:(id)permissionsManager;\n'
                  '+ (void)getPermissionWithPermissionsManager:(id)permissionsManager\n'
                  '                              withRequester:(Class)requesterClass\n'
                  '                                    resolve:(EXPromiseResolveBlock)resolve\n'
                  '                                     reject:(EXPromiseRejectBlock)reject;\n'
                  '+ (void)askForPermissionWithPermissionsManager:(id)permissionsManager\n'
                  '                                 withRequester:(Class)requesterClass\n'
                  '                                       resolve:(EXPromiseResolveBlock)resolve\n'
                  '                                        reject:(EXPromiseRejectBlock)reject;\n'
                  '@end',

              '#import <ExpoModulesCore/EXJavaScriptContextProvider.h>':
                  '/* EXJavaScriptContextProvider stub (Expo 56: not in XCFramework) */\n'
                  '@protocol EXJavaScriptContextProvider <NSObject>\n'
                  '- (void *)javaScriptRuntimePointer;\n'
                  '@end',
          })

          print('expo-av patches done.')
          PYEOF

      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Patch Pods.xcodeproj
        script: |
          ruby << 'RUBY_EOF'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('ios/Pods/Pods.xcodeproj')

          project.targets.each do |target|
            # EXAV: disable Clang explicit modules and exclude video files.
            # Xcode 26 explicit modules require each PCM to be listed in the cc1
            # command. EXVideoPlayerViewController.m only receives AVKit PCM but
            # AVKit transitively needs AVFoundation — without it the build fails.
            # Disabling explicit modules lets the compiler resolve everything via
            # implicit module loading, which handles cross-framework dependencies
            # automatically. This also avoids PCM conflicts with our inline ObjC
            # stubs for removed ExpoModulesCore headers.
            if target.name == 'EXAV'
              target.build_configurations.each do |config|
                config.build_settings['EXCLUDED_SOURCE_FILE_NAMES'] = 'ExpoVideoView.swift VideoViewModule.swift'
                config.build_settings['CLANG_EXPLICIT_MODULES_ENABLED'] = 'NO'
              end
              puts 'EXAV: excluded video Swift files, disabled explicit modules'
            end

            # ExpoTaskManager: expo-task-manager 14.x uses legacy RCT bridge APIs.
            # RN 0.85.3 defines RCT_REMOVE_LEGACY_ARCH=1 which removes those APIs.
            # Override to 0 so the legacy ObjC code compiles.
            if target.name == 'ExpoTaskManager'
              target.build_configurations.each do |config|
                existing = Array(config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] || '$(inherited)')
                existing.reject! { |d| d.to_s.include?('RCT_REMOVE_LEGACY_ARCH') }
                existing << 'RCT_REMOVE_LEGACY_ARCH=0'
                config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] = existing
              end
              puts 'ExpoTaskManager: set RCT_REMOVE_LEGACY_ARCH=0'
            end
          end

          project.save
          puts 'xcodeproj patches applied'
          RUBY_EOF

      - name: Remove push notification entitlement
        script: /usr/libexec/PlistBuddy -c "Delete :aps-environment" ios/WaveTalk/WaveTalk.entitlements 2>/dev/null || true

      - name: Create ExportOptions.plist
        script: |
          python3 -c "
          import plistlib, os
          data = {
              'method': 'app-store-connect',
              'teamID': os.environ.get('APPLE_TEAM_ID', '66U94U6Q5H'),
              'signingStyle': 'manual',
              'provisioningProfiles': {'com.wavetalk.app': 'wavetalk-appstore'},
              'uploadBitcode': False,
              'uploadSymbols': True,
              'compileBitcode': False
          }
          with open('ios/ExportOptions.plist', 'wb') as f:
              plistlib.dump(data, f, fmt=plistlib.FMT_XML)
          "

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build number
        script: cd ios && agvtool new-version -all $(date +%s)

      - name: Clean DerivedData
        script: rm -rf ~/Library/Developer/Xcode/DerivedData/

      - name: Archive
        script: |
          set -o pipefail
          mkdir -p /tmp/xcodebuild_logs
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/WaveTalk.xcarchive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER=wavetalk-appstore \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            archive 2>&1 | tee /tmp/xcodebuild_logs/build.log

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/WaveTalk.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/

    artifacts:
      - build/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
