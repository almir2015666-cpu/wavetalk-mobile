workflows:
  ios-release:
    name: WaveTalk iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: appstore_codemagic_admin
    environment:
      node: 22
      groups:
        - wavetalk
      vars:
        XCODE_WORKSPACE: "ios/WaveTalk.xcworkspace"
        XCODE_SCHEME: "WaveTalk"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Fix Expo versions
        script: npx expo install --fix

      - name: Patch expo-av source for Expo 56 XCFramework compatibility
        script: |
          python3 - << 'PYEOF'
          import os

          def patch_file(path, replacements):
              if not os.path.exists(path):
                  print(f'{path} not found - skip')
                  return
              with open(path) as f:
                  content = f.read()
              changed = False
              for orig, stub in replacements.items():
                  if orig in content:
                      content = content.replace(orig, stub)
                      print(f'  Patched: {orig}')
                      changed = True
                  else:
                      print(f'  Already patched or absent: {orig}')
              if changed:
                  with open(path, 'w') as f:
                      f.write(content)

          # EXAV.h: EXEventEmitter.h removed from XCFramework public headers.
          # NOT in PCM either (confirmed: EXAV.m compiles fine with this stub).
          print('Patching EXAV.h ...')
          patch_file('node_modules/expo-av/ios/EXAV/EXAV.h', {
              '#import <ExpoModulesCore/EXEventEmitter.h>':
                  '/* EXEventEmitter stub: absent from Expo 56 XCFramework public Headers */\n'
                  '@protocol EXEventEmitter <NSObject>\n'
                  '- (NSArray<NSString *> *)supportedEvents;\n'
                  '- (void)startObserving;\n'
                  '- (void)stopObserving;\n'
                  '@end\n'
                  '/* EXLogInfo/Warn/Error, EXFatal, EXErrorWithMessage: declared in\n'
                  '   EXDefines.h npm source but ABSENT from the Expo 56 XCFramework PCM.\n'
                  '   Forward-declared here so every file that imports EXAV.h\n'
                  '   (EXAVPlayerData.m, EXAV.m, EXAudioSessionManager.m, etc.) compiles. */\n'
                  'extern void EXLogInfo(NSString *format, ...);\n'
                  'extern void EXLogWarn(NSString *format, ...);\n'
                  'extern void EXLogError(NSString *format, ...);\n'
                  'extern NSError *EXErrorWithMessage(NSString *);\n'
                  'extern void EXFatal(NSError *);',
          })

          # EXVideoView.h: two headers missing from XCFramework public Headers/.
          # EXModuleRegistry IS in the ExpoModulesCore PCM (umbrella header exports it).
          # Using @class forward declaration avoids redefinition -- the PCM supplies
          # the full definition when ExpoModulesCore loads via EXModuleRegistryConsumer.h.
          # EXLegacyExpoViewProtocol is NOT in the PCM (completely removed), so it
          # needs a full inline stub for the protocol conformance declaration.
          print('Patching EXVideoView.h ...')
          patch_file('node_modules/expo-av/ios/EXAV/Video/EXVideoView.h', {
              '#import <ExpoModulesCore/EXModuleRegistry.h>':
                  '/* EXModuleRegistry: forward-declare only; PCM provides full def */\n'
                  '@class EXModuleRegistry;',

              '#import <ExpoModulesCore/EXLegacyExpoViewProtocol.h>':
                  '/* EXLegacyExpoViewProtocol stub: removed from Expo 56 PCM */\n'
                  '@protocol EXLegacyExpoViewProtocol <NSObject>\n'
                  '@optional\n'
                  '@end',
          })

          # EXVideoView.m: EXUtilities IS in the ExpoModulesCore PCM.
          # The original #import <ExpoModulesCore/EXUtilities.h> correctly loads EXUtilities
          # from the PCM. Previous attempts to stub @interface EXUtilities caused redefinition,
          # and replacing the import with macros-only caused "must be imported from module" error.
          # Fix: keep the original import intact -- no patch needed for EXVideoView.m.

          # EXAudioRecordingPermissionRequester.m: EXFatal and EXErrorWithMessage are declared
          # in EXDefines.h source but are ABSENT from the Expo 56 XCFramework PCM.
          # Adding extern declarations inline satisfies -Werror=implicit-function-declaration.
          print('Patching EXAudioRecordingPermissionRequester.m ...')
          patch_file('node_modules/expo-av/ios/EXAV/EXAudioRecordingPermissionRequester.m', {
              '#import <ExpoModulesCore/EXDefines.h>':
                  '#import <ExpoModulesCore/EXDefines.h>\n'
                  '/* EXFatal/EXErrorWithMessage: absent from Expo 56 XCFramework PCM */\n'
                  'extern NSError *EXErrorWithMessage(NSString *);\n'
                  'extern void EXFatal(NSError *);',
          })

          # EXAV.m: EXEventEmitterService is NOT in Expo 56 XCFramework public Headers
          # (Build 15 confirmed: ScanDependencies failed with "file not found").
          # EXAppLifecycleService, EXPermissionsMethodsDelegate, EXJavaScriptContextProvider
          # ARE in the PCM (Build 14 confirmed ODR errors when we stubbed them -- the PCM
          # already provides complete definitions). Keep their original imports intact.
          #
          # EXAV-Swift.h: generated from ExpoVideoView.swift/VideoViewModule.swift which are
          # excluded via EXCLUDED_SOURCE_FILE_NAMES. Replace the conditional #import block
          # with a full @interface stub (Build 16: @class alone is insufficient for
          # [ExpoVideoView class] under ARC + Clang 21). Returns nil at runtime; safe since
          # WaveTalk has no video. Also inject UMPromise* macros (from EXUnimodulesCompat.h
          # Legacy/ which is absent from XCFramework module map) and EXFatal/EXErrorWithMessage
          # externs (absent from XCFramework PCM, used at EXAV.m lines 269-593).
          print('Patching EXAV.m ...')
          patch_file('node_modules/expo-av/ios/EXAV/EXAV.m', {
              # EXEventEmitterService.h is NOT in the Expo 56 XCFramework public Headers/
              # (Build 15: ScanDependencies failed at line 6 with "file not found").
              # Provide a minimal stub that matches the actual protocol signature.
              '#import <ExpoModulesCore/EXEventEmitterService.h>':
                  '/* EXEventEmitterService: absent from Expo 56 XCFramework Headers */\n'
                  '@protocol EXEventEmitterService\n'
                  '- (void)sendEventWithName:(NSString *)name body:(id)body;\n'
                  '@end',

              # EXAV-Swift.h is never generated because ExpoVideoView.swift and
              # VideoViewModule.swift are excluded via EXCLUDED_SOURCE_FILE_NAMES.
              # Forward-declare ExpoVideoView so [ExpoVideoView class] compiles.
              # Append EXFatal/EXErrorWithMessage externs here since EXDefines.h
              # source declares them but they are absent from the XCFramework PCM.
              '#if __has_include(<EXAV/EXAV-Swift.h>)\n'
              '#import <EXAV/EXAV-Swift.h>\n'
              '#else\n'
              '#import "EXAV-Swift.h"\n'
              '#endif':
                  '/* EXAV-Swift.h: Swift video files excluded via EXCLUDED_SOURCE_FILE_NAMES.\n'
                  '   Full @interface required so [ExpoVideoView class] compiles under\n'
                  '   ARC + Clang 21 (returns nil at runtime; WaveTalk has no video). */\n'
                  '@interface ExpoVideoView : NSObject\n'
                  '@end\n'
                  '/* UMPromiseResolveBlock/UMPromiseRejectBlock: #define macros from\n'
                  '   EXUnimodulesCompat.h (Legacy/) which is absent from the Expo 56\n'
                  '   XCFramework public Headers module map. Expand to EXPromise* typedefs\n'
                  '   that ARE in the PCM (EXDefines.h). */\n'
                  '#ifndef UMPromiseResolveBlock\n'
                  '#define UMPromiseResolveBlock EXPromiseResolveBlock\n'
                  '#endif\n'
                  '#ifndef UMPromiseRejectBlock\n'
                  '#define UMPromiseRejectBlock EXPromiseRejectBlock\n'
                  '#endif\n'
                  '/* EXFatal/EXErrorWithMessage: also in EXAV.h externs but repeated\n'
                  '   here since EXAV.m uses them at lines 269-593. */\n'
                  'extern NSError *EXErrorWithMessage(NSString *);\n'
                  'extern void EXFatal(NSError *);',
          })

          print('expo-av patches done.')
          PYEOF

      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Patch Pods.xcodeproj
        script: |
          ruby << 'RUBY_EOF'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('ios/Pods/Pods.xcodeproj')

          project.targets.each do |target|
            if target.name == 'EXAV'
              target.build_configurations.each do |config|
                config.build_settings['EXCLUDED_SOURCE_FILE_NAMES'] = 'ExpoVideoView.swift VideoViewModule.swift'
                config.build_settings['CLANG_EXPLICIT_MODULES_ENABLED'] = 'NO'
              end
              puts 'EXAV: excluded video Swift files, disabled explicit modules'
            end

            if target.name == 'ExpoTaskManager'
              target.build_configurations.each do |config|
                existing = Array(config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] || '$(inherited)')
                existing.reject! { |d| d.to_s.include?('RCT_REMOVE_LEGACY_ARCH') }
                existing << 'RCT_REMOVE_LEGACY_ARCH=0'
                config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] = existing
              end
              puts 'ExpoTaskManager: set RCT_REMOVE_LEGACY_ARCH=0'
            end
          end

          project.save
          puts 'xcodeproj patches applied'
          RUBY_EOF

      - name: Remove push notification entitlement
        script: /usr/libexec/PlistBuddy -c "Delete :aps-environment" ios/WaveTalk/WaveTalk.entitlements 2>/dev/null || true

      - name: Create ExportOptions.plist
        script: |
          python3 -c "
          import plistlib
          data = {
              'method': 'app-store-connect',
              'teamID': '66U94U6Q5H',
              'signingStyle': 'manual',
              'provisioningProfiles': {'com.wavetalk.app': 'wavetalk-appstore'},
              'uploadBitcode': False,
              'uploadSymbols': True,
              'compileBitcode': False
          }
          with open('ios/ExportOptions.plist', 'wb') as f:
              plistlib.dump(data, f, fmt=plistlib.FMT_XML)
          "

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files com.wavetalk.app \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build number
        script: cd ios && agvtool new-version -all $(date +%s)

      - name: Clean DerivedData
        script: rm -rf ~/Library/Developer/Xcode/DerivedData/

      - name: Archive
        script: |
          mkdir -p build
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/WaveTalk.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="wavetalk-appstore" \
            DEVELOPMENT_TEAM=66U94U6Q5H \
            archive \
            2>&1 | tee build/xcodebuild.log
          BUILD_EC=${PIPESTATUS[0]}
          if [ $BUILD_EC -ne 0 ]; then
            echo "=== COMPILATION ERRORS (first 80) ==="
            grep -n " error:" build/xcodebuild.log | grep -v "note:\|warning:" | head -80 || true
            echo "=== END ERRORS ==="
          fi
          exit $BUILD_EC

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/WaveTalk.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/

    artifacts:
      - build/*.ipa
      - build/xcodebuild.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
