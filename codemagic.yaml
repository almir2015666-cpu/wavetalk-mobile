workflows:
  ios-release:
    name: WaveTalk iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    integrations:
      app_store_connect: appstore_codemagic_admin
    environment:
      xcode: 26.4
      node: 22
      groups:
        - wavetalk
      vars:
        BUNDLE_ID: "com.wavetalk.app"
        XCODE_WORKSPACE: "ios/WaveTalk.xcworkspace"
        XCODE_SCHEME: "WaveTalk"
    scripts:
      - name: Instalar dependências
        script: npm install --legacy-peer-deps

      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Instalar CocoaPods
        script: |
          cd ios
          pod install

      - name: Patch C++ — Xcode 26 compatibility
        script: |
          PBXPROJ="ios/Pods/Pods.xcodeproj/project.pbxproj"

          echo "=== ANTES ==="
          grep -rh "CLANG_CXX_LANGUAGE_STANDARD" ios/Pods --include="*.xcconfig" | sort -u
          grep "CLANG_CXX_LANGUAGE_STANDARD" "$PBXPROJ" | head -3

          echo "=== Patch xcconfigs ==="
          find ios/Pods -name "*.xcconfig" | while read f; do
            sed -i '' 's/CLANG_CXX_LANGUAGE_STANDARD = c++20/CLANG_CXX_LANGUAGE_STANDARD = c++17/g' "$f"
            sed -i '' 's/GCC_TREAT_WARNINGS_AS_ERRORS = YES/GCC_TREAT_WARNINGS_AS_ERRORS = NO/g' "$f"
            sed -i '' 's/-Werror//g' "$f"
          done

          echo "=== Patch pbxproj ==="
          sed -i '' 's/CLANG_CXX_LANGUAGE_STANDARD = "c++20"/CLANG_CXX_LANGUAGE_STANDARD = "c++17"/g' "$PBXPROJ"
          sed -i '' 's/CLANG_CXX_LANGUAGE_STANDARD = c++20;/CLANG_CXX_LANGUAGE_STANDARD = c++17;/g' "$PBXPROJ"
          sed -i '' 's/CLANG_CXX_LANGUAGE_STANDARD = c++20 /CLANG_CXX_LANGUAGE_STANDARD = c++17 /g' "$PBXPROJ"
          sed -i '' 's/GCC_TREAT_WARNINGS_AS_ERRORS = YES/GCC_TREAT_WARNINGS_AS_ERRORS = NO/g' "$PBXPROJ"

          echo "=== DEPOIS ==="
          grep -rh "CLANG_CXX_LANGUAGE_STANDARD" ios/Pods --include="*.xcconfig" | sort -u
          grep "CLANG_CXX_LANGUAGE_STANDARD" "$PBXPROJ" | head -3
          echo "c++20 restantes em xcconfig: $(grep -r 'c++20' ios/Pods --include='*.xcconfig' | wc -l)"
          echo "c++20 restantes em pbxproj:  $(grep -c 'c++20' "$PBXPROJ" || echo 0)"

      - name: Remover push notification entitlement
        script: |
          /usr/libexec/PlistBuddy -c "Delete :aps-environment" ios/WaveTalk/WaveTalk.entitlements 2>/dev/null || true

      - name: Criar/buscar certificado e perfil de distribuição
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates

      - name: Configurar assinatura automática
        script: xcode-project use-profiles

      - name: Definir número de build único
        script: |
          cd ios
          agvtool new-version -all $(date +%s)

      - name: Gerar .ipa assinado
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
