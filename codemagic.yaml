workflows:
  ios-release:
    name: WaveTalk iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    integrations:
      app_store_connect: appstore_codemagic_admin
    environment:
      xcode: 26.4
      node: 22
      groups:
        - wavetalk
      vars:
        BUNDLE_ID: "com.wavetalk.app"
        XCODE_WORKSPACE: "ios/WaveTalk.xcworkspace"
        XCODE_SCHEME: "WaveTalk"
    scripts:
      - name: Instalar dependências
        script: npm install --legacy-peer-deps

      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Patch Podfile — Xcode 26 antes do pod install
        script: |
          # Suprime TODOS os warnings nos pods (adiciona -w, remove -Wall -Werror)
          echo "inhibit_all_warnings!" >> ios/Podfile

          # Adiciona post_install que roda por ÚLTIMO (após react_native_post_install)
          # e força c++17 + desliga warnings-as-errors em TODOS os targets
          cat >> ios/Podfile << 'RUBY'

post_install do |installer|
  installer.pods_project.targets.each do |target|
    target.build_configurations.each do |config|
      config.build_settings['CLANG_CXX_LANGUAGE_STANDARD'] = 'c++17'
      config.build_settings['GCC_TREAT_WARNINGS_AS_ERRORS'] = 'NO'
      config.build_settings['SWIFT_SUPPRESS_WARNINGS'] = 'YES'
    end
  end
end
RUBY
          echo "Podfile patched — últimas 15 linhas:"
          tail -15 ios/Podfile

      - name: Instalar CocoaPods
        script: |
          cd ios
          pod install

      - name: Remover push notification entitlement
        script: |
          /usr/libexec/PlistBuddy -c "Delete :aps-environment" ios/WaveTalk/WaveTalk.entitlements 2>/dev/null || true

      - name: Criar/buscar certificado e perfil de distribuição
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates

      - name: Configurar assinatura automática
        script: xcode-project use-profiles

      - name: Definir número de build único
        script: |
          cd ios
          agvtool new-version -all $(date +%s)

      - name: Gerar .ipa assinado
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
