workflows:
  ios-release:
    name: WaveTalk iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    integrations:
      app_store_connect: appstore_codemagic_admin
    environment:
      xcode: 26.4
      node: 22
      groups:
        - wavetalk
      vars:
        BUNDLE_ID: "com.wavetalk.app"
        XCODE_WORKSPACE: "ios/WaveTalk.xcworkspace"
        XCODE_SCHEME: "WaveTalk"
    scripts:
      - name: Instalar dependências
        script: npm install --legacy-peer-deps

      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Patch Podfile — Xcode 26 antes do pod install
        script: |
          node -e "
          const fs = require('fs');
          const q = String.fromCharCode(39);
          let c = fs.readFileSync('ios/Podfile', 'utf8');

          const inject = [
            '  installer.pods_project.targets.each do |target|',
            '    target.build_configurations.each do |config|',
            '      config.build_settings[' + q + 'CLANG_CXX_LANGUAGE_STANDARD' + q + '] = ' + q + 'c++17' + q,
            '      config.build_settings[' + q + 'GCC_TREAT_WARNINGS_AS_ERRORS' + q + '] = ' + q + 'NO' + q,
            '      config.build_settings[' + q + 'SWIFT_SUPPRESS_WARNINGS' + q + '] = ' + q + 'YES' + q,
            '    end',
            '  end'
          ].join('\n');

          // Injeta antes do ultimo 'end' do arquivo (fecha o post_install do block)
          const lines = c.split('\n');
          let lastEnd = -1;
          for (let i = lines.length - 1; i >= 0; i--) {
            if (lines[i] === 'end') { lastEnd = i; break; }
          }
          if (lastEnd !== -1) {
            lines.splice(lastEnd, 0, inject);
            c = lines.join('\n');
            console.log('Injected before line ' + lastEnd);
          } else {
            console.log('WARNING: last end not found!');
          }

          if (!c.includes('inhibit_all_warnings!')) c = 'inhibit_all_warnings!\n' + c;
          fs.writeFileSync('ios/Podfile', c);
          console.log('Done!');
          "
          echo "=== Últimas 30 linhas do Podfile ==="
          tail -30 ios/Podfile

      - name: Instalar CocoaPods
        script: |
          cd ios
          pod install

      - name: Remover push notification entitlement
        script: |
          /usr/libexec/PlistBuddy -c "Delete :aps-environment" ios/WaveTalk/WaveTalk.entitlements 2>/dev/null || true

      - name: Criar/buscar certificado e perfil de distribuição
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates

      - name: Configurar assinatura automática
        script: xcode-project use-profiles

      - name: Definir número de build único
        script: |
          cd ios
          agvtool new-version -all $(date +%s)

      - name: Gerar .ipa assinado
        script: |
          set +e
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
          BUILD_EXIT=$?
          if [ $BUILD_EXIT -ne 0 ]; then
            echo ""
            echo "====== LOGS DISPONIVEIS ======"
            ls /tmp/xcodebuild_logs/ 2>/dev/null || echo "(sem logs em /tmp/xcodebuild_logs)"
            echo ""
            echo "====== ERROS DO COMPILADOR ======"
            for LOG in /tmp/xcodebuild_logs/*.log; do
              [ -f "$LOG" ] || continue
              echo "--- $LOG ---"
              grep -i "error:" "$LOG" | grep -v "^note:" | grep -v "warning:" | head -60
            done
            echo ""
            echo "====== ULTIMAS 80 LINHAS DO LOG ======"
            for LOG in /tmp/xcodebuild_logs/*.log; do
              [ -f "$LOG" ] || continue
              tail -80 "$LOG"
            done
            echo "================================="
          fi
          exit $BUILD_EXIT

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
