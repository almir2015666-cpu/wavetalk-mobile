workflows:
  ios-release:
    name: WaveTalk iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: appstore_codemagic_admin
    environment:
      node: 22
      groups:
        - wavetalk
      vars:
        BUNDLE_ID: "com.wavetalk.app"
        XCODE_WORKSPACE: "ios/WaveTalk.xcworkspace"
        XCODE_SCHEME: "WaveTalk"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Fix Expo versions
        script: npx expo install --fix

      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Patch pods for Xcode 26 / Expo 56 compatibility
        script: |
          # 1. Add missing protocol stubs to ExpoModulesCore XCFramework headers
          python3 -c "
          import os, re

          stubs = {
              'EXEventEmitter.h': '''#pragma once
          #import <Foundation/Foundation.h>
          @protocol EXEventEmitter <NSObject>
          - (NSArray<NSString *> *)supportedEvents;
          - (void)startObserving;
          - (void)stopObserving;
          @end''',
              'EXImageLoaderInterface.h': '''#pragma once
          #import <Foundation/Foundation.h>
          @protocol EXImageLoaderInterface <NSObject>
          @end''',
              'RCTBridgeModuleCompat.h': '''#pragma once
          #import <Foundation/Foundation.h>
          #ifndef RCT_BRIDGE_MODULE_COMPAT
          #define RCT_BRIDGE_MODULE_COMPAT
          @protocol RCTBridgeModule <NSObject>
          @optional
          + (NSString *)moduleName;
          @end
          #endif''',
          }

          base = 'ios/Pods/ExpoModulesCore/ExpoModulesCore.xcframework'
          if not os.path.isdir(base):
              print('WARNING: xcframework not found at ' + base)
          else:
              for variant in os.listdir(base):
                  hdir = os.path.join(base, variant, 'ExpoModulesCore.framework', 'Headers')
                  if not os.path.isdir(hdir):
                      continue

                  # Write stub files
                  for fname, content in stubs.items():
                      p = os.path.join(hdir, fname)
                      if not os.path.exists(p):
                          with open(p, 'w') as f:
                              f.write(content)
                          print('Created: ' + p)

                  # Patch EXImageLoader.h to import EXImageLoaderInterface.h
                  il = os.path.join(hdir, 'EXImageLoader.h')
                  if os.path.exists(il):
                      with open(il, 'r') as f:
                          c = f.read()
                      if 'EXImageLoaderInterface.h' not in c:
                          with open(il, 'w') as f:
                              f.write('#import \"EXImageLoaderInterface.h\"\n' + c)
                          print('Patched EXImageLoader.h in ' + variant)

                  # Patch EXModuleRegistryHolderReactModule.h to import RCTBridgeModule compat
                  mrm = os.path.join(hdir, 'EXModuleRegistryHolderReactModule.h')
                  if os.path.exists(mrm):
                      with open(mrm, 'r') as f:
                          c = f.read()
                      if 'RCTBridgeModuleCompat.h' not in c:
                          with open(mrm, 'w') as f:
                              f.write('#import \"RCTBridgeModuleCompat.h\"\n' + c)
                          print('Patched EXModuleRegistryHolderReactModule.h in ' + variant)
          "

          # 2. xcodeproj patches: exclude EXAV video Swift files + fix ExpoTaskManager
          ruby << 'RUBY_EOF'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('ios/Pods/Pods.xcodeproj')

          project.targets.each do |target|
            # EXAV: exclude video Swift files — WaveTalk is audio-only, video Swift files
            # trigger the ExpoModulesCore Clang module build which fails with Expo 56 XCFramework
            if target.name == 'EXAV'
              target.build_configurations.each do |config|
                config.build_settings['EXCLUDED_SOURCE_FILE_NAMES'] = 'ExpoVideoView.swift VideoViewModule.swift'
              end
              puts 'EXAV: excluded video Swift files'
            end

            # ExpoTaskManager: expo-task-manager 14.x uses legacy RCT bridge APIs.
            # RN 0.85.3 sets RCT_REMOVE_LEGACY_ARCH=1 which removes those APIs.
            # Override to 0 so the legacy ObjC code still compiles.
            if target.name == 'ExpoTaskManager'
              target.build_configurations.each do |config|
                existing = Array(config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] || '$(inherited)')
                existing.reject! { |d| d.to_s.include?('RCT_REMOVE_LEGACY_ARCH') }
                existing << 'RCT_REMOVE_LEGACY_ARCH=0'
                config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] = existing
              end
              puts 'ExpoTaskManager: set RCT_REMOVE_LEGACY_ARCH=0'
            end
          end

          project.save
          puts 'xcodeproj patches applied'
          RUBY_EOF

      - name: Remove push notification entitlement
        script: /usr/libexec/PlistBuddy -c "Delete :aps-environment" ios/WaveTalk/WaveTalk.entitlements 2>/dev/null || true

      - name: Create ExportOptions.plist
        script: |
          python3 -c "
          import plistlib, os
          data = {
              'method': 'app-store-connect',
              'teamID': os.environ.get('APPLE_TEAM_ID', '66U94U6Q5H'),
              'signingStyle': 'manual',
              'provisioningProfiles': {'com.wavetalk.app': 'wavetalk-appstore'},
              'uploadBitcode': False,
              'uploadSymbols': True,
              'compileBitcode': False
          }
          with open('ios/ExportOptions.plist', 'wb') as f:
              plistlib.dump(data, f, fmt=plistlib.FMT_XML)
          "

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build number
        script: cd ios && agvtool new-version -all $(date +%s)

      - name: Archive
        script: |
          mkdir -p /tmp/xcodebuild_logs
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/WaveTalk.xcarchive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER=wavetalk-appstore \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            archive 2>&1 | tee /tmp/xcodebuild_logs/build.log

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/WaveTalk.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/

    artifacts:
      - build/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
