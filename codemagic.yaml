workflows:
  ios-release:
    name: WaveTalk iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: appstore_codemagic_admin
    environment:
      xcode: 26.4
      node: 22
      groups:
        - wavetalk
      vars:
        XCODE_WORKSPACE: ios/WaveTalk.xcworkspace
        XCODE_SCHEME: WaveTalk
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Patch Podfile — Xcode 26 C++ compatibility
        script: |
          python3 << 'PYEOF'
          with open('ios/Podfile', 'r') as f:
              content = f.read()

          fix = """
            # Fix: Xcode 26 stricter C++ — fmt, Yoga, Folly compatibility
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CLANG_CXX_LANGUAGE_STANDARD'] = 'c++17'
                config.build_settings['CLANG_CXX_LIBRARY'] = 'libc++'
                config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] ||= ['$(inherited)']
              end
            end
          """

          if 'post_install do |installer|' in content:
              content = content.replace(
                  'post_install do |installer|',
                  'post_install do |installer|\n' + fix,
                  1
              )
          else:
              content += '\npost_install do |installer|\n' + fix + '\nend\n'

          with open('ios/Podfile', 'w') as f:
              f.write(content)

          print("Podfile patched for Xcode 26")
          PYEOF

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Set build number
        script: |
          cd ios
          agvtool new-version -all $BUILD_NUMBER
      - name: Remove push notification entitlement
        script: |
          /usr/libexec/PlistBuddy -c "Delete :aps-environment" ios/WaveTalk/WaveTalk.entitlements 2>/dev/null || true
      - name: Set up code signing
        script: |
          keychain initialize
          export APP_STORE_CONNECT_KEY_IDENTIFIER="$APP_STORE_CONNECT_KEY_ID"
          export APP_STORE_CONNECT_PRIVATE_KEY="$APP_STORE_CONNECT_API_KEY"
          app-store-connect fetch-signing-files com.wavetalk.app \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
      - name: Configure Xcode signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
