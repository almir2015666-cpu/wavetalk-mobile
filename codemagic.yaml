workflows:
  ios-release:
    name: WaveTalk iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: appstore_codemagic_admin
    environment:
      groups:
        - wavetalk
      vars:
        XCODE_WORKSPACE: ios/WaveTalk.xcworkspace
        XCODE_SCHEME: WaveTalk
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Remove push notification entitlement
        script: |
          /usr/libexec/PlistBuddy -c "Delete :aps-environment" ios/WaveTalk/WaveTalk.entitlements 2>/dev/null || true
      - name: Set up code signing
        script: |
          keychain initialize
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
      - name: Install provisioning profile
        script: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/wavetalk.mobileprovision
          security cms -D -i /tmp/wavetalk.mobileprovision -o /tmp/profile.plist
          UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile.plist)
          echo "Profile UUID: $UUID"
          cp /tmp/wavetalk.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/${UUID}.mobileprovision"
          echo "PROFILE_UUID=$UUID" >> $CM_ENV
      - name: Build IPA
        script: |
          mkdir -p build/ios/ipa
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>66U94U6Q5H</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.wavetalk.app</key>
              <string>wavetalk-appstore</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/ios/ipa/WaveTalk.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER=wavetalk-appstore \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            DEVELOPMENT_TEAM=66U94U6Q5H \
            archive
          xcodebuild -exportArchive \
            -archivePath build/ios/ipa/WaveTalk.xcarchive \
            -exportPath build/ios/ipa/ \
            -exportOptionsPlist /tmp/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
