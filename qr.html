<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WaveTalk - Abrir no Celular</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #07090f;
    color: #dde8f5;
    font-family: -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #0d1320;
    border: 1px solid #243347;
    border-radius: 24px;
    padding: 40px;
    text-align: center;
    max-width: 400px;
    width: 90%;
  }
  .logo { font-size: 32px; font-weight: 900; color: #00d4ff; margin-bottom: 6px; }
  .sub  { font-size: 12px; color: #3d566e; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px; }
  #qrcode canvas, #qrcode img { border-radius: 12px; }
  .url {
    margin-top: 20px;
    background: #111927;
    border: 1px solid #243347;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    color: #00d4ff;
    font-family: monospace;
    word-break: break-all;
  }
  .steps { margin-top: 24px; text-align: left; }
  .step { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .num  { background: #00d4ff22; color: #00d4ff; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .txt  { font-size: 13px; color: #6b859e; line-height: 1.5; }
  .txt strong { color: #dde8f5; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">WaveTalk</div>
  <div class="sub">Escanear com o iPhone</div>
  <div id="qrcode"></div>
  <div class="url">exp://192.168.0.35:8081</div>
  <div class="steps">
    <div class="step">
      <div class="num">1</div>
      <div class="txt">Instale o <strong>Expo Go</strong> na App Store</div>
    </div>
    <div class="step">
      <div class="num">2</div>
      <div class="txt">Abra o app e toque em <strong>"Enter URL manually"</strong></div>
    </div>
    <div class="step">
      <div class="num">3</div>
      <div class="txt">Digite: <strong>exp://192.168.0.35:8081</strong></div>
    </div>
    <div class="step">
      <div class="num">4</div>
      <div class="txt">Ou aponte a <strong>câmera do iPhone</strong> para o QR code acima</div>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  new QRCode(document.getElementById("qrcode"), {
    text: "exp://192.168.0.35:8081",
    width: 240,
    height: 240,
    colorDark: "#00d4ff",
    colorLight: "#07090f",
    correctLevel: QRCode.CorrectLevel.M
  });
</script>
</body>
</html>
